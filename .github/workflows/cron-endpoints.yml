name: Trigger backend cron endpoints

on:
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate required secrets
        run: |
          if [[ -z "${{ secrets.CRON_BASE_URL }}" ]]; then
            echo "CRON_BASE_URL secret is required"
            exit 1
          fi
          if [[ -z "${{ secrets.CRON_SECRET }}" ]]; then
            echo "CRON_SECRET secret is required"
            exit 1
          fi

      - name: Trigger all cron endpoints (manual fallback)
        run: |
          set -euo pipefail
          endpoints=(
            "/api/cron/auto-notificacao-envio"
            "/api/cron/auto-notificacao-envio-em-transporte"
            "/api/cron/auto-notificacao-incidencia"
          )

          for endpoint in "${endpoints[@]}"; do
            curl --fail --show-error --silent \
              -X GET \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              "${{ secrets.CRON_BASE_URL }}${endpoint}"
          done
