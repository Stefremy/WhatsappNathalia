name: Trigger backend cron endpoints

on:
  schedule:
    # Incidencias: every 10 minutes on weekdays.
    - cron: '*/10 * * * 1-5'
    # Em distribuicao: 09:30 Lisbon on weekdays.
    # DST-safe: trigger both UTC slots; backend keeps Lisbon-time guard.
    - cron: '30 8 * * 1-5'
    - cron: '30 9 * * 1-5'
    # Em transporte: 10:00 Lisbon on weekdays.
    # DST-safe: trigger both UTC slots; backend keeps Lisbon-time guard.
    - cron: '0 9 * * 1-5'
    - cron: '0 10 * * 1-5'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate required secrets
        run: |
          if [[ -z "${{ secrets.CRON_BASE_URL }}" ]]; then
            echo "CRON_BASE_URL secret is required"
            exit 1
          fi
          if [[ -z "${{ secrets.CRON_SECRET }}" ]]; then
            echo "CRON_SECRET secret is required"
            exit 1
          fi

      - name: Trigger scheduled messages processor
        run: |
          set -euo pipefail
          curl --fail --show-error --silent \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CRON_BASE_URL }}/api/messages/process-scheduled"

      - name: Trigger AUTO_NOTIFICACAO_ENVIO cron endpoint
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 8 * * 1-5' || github.event.schedule == '30 9 * * 1-5'
        run: |
          set -euo pipefail
          curl --fail --show-error --silent \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CRON_BASE_URL }}/api/cron/auto-notificacao-envio"

      - name: Trigger AUTO_NOTIFICACAO_ENVIO_EM_TRANSPORTE cron endpoint
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 9 * * 1-5' || github.event.schedule == '0 10 * * 1-5'
        run: |
          set -euo pipefail
          curl --fail --show-error --silent \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CRON_BASE_URL }}/api/cron/auto-notificacao-envio-em-transporte"

      - name: Trigger AUTO_NOTIFICACAO_INCIDENCIA cron endpoint
        if: github.event_name == 'workflow_dispatch' || github.event.schedule == '*/10 * * * 1-5'
        run: |
          set -euo pipefail
          curl --fail --show-error --silent \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CRON_BASE_URL }}/api/cron/auto-notificacao-incidencia?force=true"
