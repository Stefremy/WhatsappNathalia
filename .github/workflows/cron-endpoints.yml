name: Trigger backend cron endpoints

on:
  schedule:
    # Em distribuicao: 09:30 Lisbon on weekdays.
    # DST-safe: trigger both UTC slots; backend keeps Lisbon-time guard.
    - cron: '30 8 * * 1-5'
    - cron: '30 9 * * 1-5'
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate required secrets
        run: |
          if [[ -z "${{ secrets.CRON_BASE_URL }}" ]]; then
            echo "CRON_BASE_URL secret is required"
            exit 1
          fi
          if [[ -z "${{ secrets.CRON_SECRET }}" ]]; then
            echo "CRON_SECRET secret is required"
            exit 1
          fi

      - name: Trigger AUTO_NOTIFICACAO_ENVIO cron endpoint
        run: |
          set -euo pipefail
          curl --fail --show-error --silent \
            -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CRON_BASE_URL }}/api/cron/auto-notificacao-envio"
